# FlightDex OWASP ZAP pen-test harness — everything in containers.
#   docker compose up -d --build              # SQL + API (waits until both healthy)
#   docker compose --profile scan run --rm zap # run the ZAP baseline, output to the terminal
#   docker compose down -v                     # tear everything down
# Reports land in ./diagrams/zap/zap-after.{html,md}.
name: flightdex-pentest

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ng!Passw0rd2026"
    ports:
      - "11433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Backend/src/Bootstrap/FlightDex.Api/Dockerfile
    environment:
      ConnectionStrings__FlightDex: "Server=sql,1433;Database=FlightDex;User Id=sa;Password=Str0ng!Passw0rd2026;TrustServerCertificate=True;MultipleActiveResultSets=true"
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
    ports:
      - "5080:8080"
    depends_on:
      sql:
        condition: service_healthy
    healthcheck:
      # Route-agnostic: any HTTP response (even 404) means Kestrel is up. This holds
      # for both the hardened API (/v1/flight) and the pre-fix API (/flight).
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # One-shot ZAP baseline. Runs only with `--profile scan`; waits for the API to be healthy.
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    profiles: ["scan"]
    volumes:
      - ./diagrams/zap:/zap/wrk:rw
    depends_on:
      api:
        condition: service_healthy
    command: zap-baseline.py -t http://api:8080/v1/flight -r zap-after.html -w zap-after.md -I
