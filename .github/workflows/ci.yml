name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FlightDex.slnx

      - name: Build
        run: dotnet build FlightDex.slnx --configuration Release --no-restore

      - name: Test (unit + integration + e2e, with coverage)
        run: >
          dotnet test FlightDex.slnx
          --configuration Release
          --no-build
          --filter "Category!=Perf"
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload test results & coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Backend/TestResults/**
